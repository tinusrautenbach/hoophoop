table:
  name: player_claim_requests
  schema: public
configuration:
  column_config:
    athlete_id:
      custom_name: athleteId
    community_id:
      custom_name: communityId
    rejection_reason:
      custom_name: rejectionReason
    requested_at:
      custom_name: requestedAt
    reviewed_at:
      custom_name: reviewedAt
    reviewed_by:
      custom_name: reviewedBy
    user_id:
      custom_name: userId
  custom_column_names:
    athlete_id: athleteId
    community_id: communityId
    rejection_reason: rejectionReason
    requested_at: requestedAt
    reviewed_at: reviewedAt
    reviewed_by: reviewedBy
    user_id: userId
  custom_name: playerClaimRequests
  identifier: playerClaimRequests
  custom_root_fields:
    delete: deletePlayerClaimRequests
    delete_by_pk: deletePlayerClaimRequestsByPk
    insert: insertPlayerClaimRequests
    insert_one: insertPlayerClaimRequestsOne
    select: playerClaimRequests
    select_aggregate: playerClaimRequestsAggregate
    select_by_pk: playerClaimRequestsByPk
    update: updatePlayerClaimRequests
    update_by_pk: updatePlayerClaimRequestsByPk
object_relationships:
  - name: athlete
    using:
      foreign_key_constraint_on: athlete_id
  - name: community
    using:
      foreign_key_constraint_on: community_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - athlete_id
        - user_id
        - status
        - community_id
        - requested_at
        - reviewed_at
        - reviewed_by
        - rejection_reason
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - id
        - athlete_id
        - user_id
        - status
        - community_id
update_permissions:
  - role: user
    permission:
      columns:
        - status
        - reviewed_at
        - reviewed_by
        - rejection_reason
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter: {}
event_triggers: []
