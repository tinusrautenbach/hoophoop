      columns:
        - community_id
        - season_id
        - name
        - scheduled_date
        - visibility
        - home_team_id
        - guest_team_id
        - home_team_name
        - guest_team_name
        - status
        - current_period
        - total_periods
        - period_seconds
        - clock_seconds
        - home_score
        - guest_score
        - home_fouls
        - guest_fouls
        - home_timeouts
        - guest_timeouts
        - total_timeouts
        - possession
        - mode
        - is_timer_running
        - timer_started_at
        - timer_offset_seconds
        - updated_at
        - deleted_at
      filter: {}
      check: {}
delete_permissions:
