table:
  name: games
  schema: public
configuration:
  column_config:
    clock_seconds:
      custom_name: clockSeconds
    community_id:
      custom_name: communityId
    created_at:
      custom_name: createdAt
    current_period:
      custom_name: currentPeriod
    deleted_at:
      custom_name: deletedAt
    guest_fouls:
      custom_name: guestFouls
    guest_score:
      custom_name: guestScore
    guest_team_id:
      custom_name: guestTeamId
    guest_team_name:
      custom_name: guestTeamName
    guest_timeouts:
      custom_name: guestTimeouts
    home_fouls:
      custom_name: homeFouls
    home_score:
      custom_name: homeScore
    home_team_id:
      custom_name: homeTeamId
    home_team_name:
      custom_name: homeTeamName
    home_timeouts:
      custom_name: homeTimeouts
    is_timer_running:
      custom_name: isTimerRunning
    owner_id:
      custom_name: ownerId
    period_seconds:
      custom_name: periodSeconds
    scheduled_date:
      custom_name: scheduledDate
    season_id:
      custom_name: seasonId
    timer_offset_seconds:
      custom_name: timerOffsetSeconds
    timer_started_at:
      custom_name: timerStartedAt
    total_periods:
      custom_name: totalPeriods
