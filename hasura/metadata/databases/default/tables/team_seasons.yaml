table:
  name: team_seasons
  schema: public
configuration:
  column_config:
    community_id:
      custom_name: communityId
    created_at:
      custom_name: createdAt
    season_id:
      custom_name: seasonId
    team_id:
      custom_name: teamId
  custom_column_names:
    community_id: communityId
    created_at: createdAt
    season_id: seasonId
    team_id: teamId
  custom_name: teamSeasons
  identifier: teamSeasons
  custom_root_fields:
    delete: deleteTeamSeasons
    delete_by_pk: deleteTeamSeasonsByPk
    insert: insertTeamSeasons
    insert_one: insertTeamSeasonsOne
    select: teamSeasons
    select_aggregate: teamSeasonsAggregate
    select_by_pk: teamSeasonsByPk
    update: updateTeamSeasons
    update_by_pk: updateTeamSeasonsByPk
object_relationships:
  - name: team
    using:
      foreign_key_constraint_on: team_id
  - name: season
    using:
      foreign_key_constraint_on: season_id
  - name: community
    using:
      foreign_key_constraint_on: community_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - team_id
        - season_id
        - community_id
        - status
        - created_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - id
        - team_id
        - season_id
        - community_id
        - status
update_permissions:
  - role: user
    permission:
      columns:
        - status
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter: {}
event_triggers: []
