table:
  name: player_history
  schema: public
configuration:
  column_config:
    athlete_id:
      custom_name: athleteId
    created_at:
      custom_name: createdAt
    new_value:
      custom_name: newValue
    performed_by:
      custom_name: performedBy
    previous_value:
      custom_name: previousValue
    team_id:
      custom_name: teamId
  custom_column_names:
    athlete_id: athleteId
    created_at: createdAt
    new_value: newValue
    performed_by: performedBy
    previous_value: previousValue
    team_id: teamId
  custom_name: playerHistory
  identifier: playerHistory
  custom_root_fields:
    delete: deletePlayerHistory
    delete_by_pk: deletePlayerHistoryByPk
    insert: insertPlayerHistory
    insert_one: insertPlayerHistoryOne
    select: playerHistory
    select_aggregate: playerHistoryAggregate
    select_by_pk: playerHistoryByPk
    update: updatePlayerHistory
    update_by_pk: updatePlayerHistoryByPk
object_relationships:
  - name: athlete
    using:
      foreign_key_constraint_on: athlete_id
  - name: team
    using:
      foreign_key_constraint_on: team_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - athlete_id
        - team_id
        - action
        - previous_value
        - new_value
        - performed_by
        - notes
        - created_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - id
        - athlete_id
        - team_id
        - action
        - previous_value
        - new_value
        - performed_by
        - notes
delete_permissions:
  - role: user
    permission:
      filter: {}
event_triggers: []
