table:
  name: player_invitations
  schema: public
configuration:
  column_config:
    athlete_id:
      custom_name: athleteId
    created_at:
      custom_name: createdAt
    created_by:
      custom_name: createdBy
    expires_at:
      custom_name: expiresAt
  custom_column_names:
    athlete_id: athleteId
    created_at: createdAt
    created_by: createdBy
    expires_at: expiresAt
  custom_name: playerInvitations
  identifier: playerInvitations
  custom_root_fields:
    delete: deletePlayerInvitations
    delete_by_pk: deletePlayerInvitationsByPk
    insert: insertPlayerInvitations
    insert_one: insertPlayerInvitationsOne
    select: playerInvitations
    select_aggregate: playerInvitationsAggregate
    select_by_pk: playerInvitationsByPk
    update: updatePlayerInvitations
    update_by_pk: updatePlayerInvitationsByPk
object_relationships:
  - name: athlete
    using:
      foreign_key_constraint_on: athlete_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - athlete_id
        - email
        - token
        - status
        - expires_at
        - created_by
        - created_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - id
        - athlete_id
        - email
        - token
        - status
        - expires_at
        - created_by
update_permissions:
  - role: user
    permission:
      columns:
        - status
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter: {}
event_triggers: []
