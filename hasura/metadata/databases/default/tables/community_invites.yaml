table:
  name: community_invites
  schema: public
configuration:
  column_config:
    community_id:
      custom_name: communityId
    created_at:
      custom_name: createdAt
    expires_at:
      custom_name: expiresAt
  custom_column_names:
    community_id: communityId
    created_at: createdAt
    expires_at: expiresAt
  custom_name: communityInvites
  identifier: communityInvites
  custom_root_fields:
    delete: deleteCommunityInvites
    delete_by_pk: deleteCommunityInvitesByPk
    insert: insertCommunityInvites
    insert_one: insertCommunityInvitesOne
    select: communityInvites
    select_aggregate: communityInvitesAggregate
    select_by_pk: communityInvitesByPk
    update: updateCommunityInvites
    update_by_pk: updateCommunityInvitesByPk
object_relationships:
  - name: community
    using:
      foreign_key_constraint_on: community_id
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - community_id
        - email
        - role
        - token
        - status
        - expires_at
        - created_at
      filter: {}
      allow_aggregations: true
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - id
        - community_id
        - email
        - role
        - token
        - status
        - expires_at
update_permissions:
  - role: user
    permission:
      columns:
        - status
      filter: {}
      check: {}
delete_permissions:
  - role: user
    permission:
      filter: {}
event_triggers: []
